<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Analytics Assistant</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            <h1>Employee Analytics Assistant</h1>
            <p>Ask anything about employees, salaries, managers, or promotions.</p>
        </div>

        <div id="chatMessages" class="chat-messages">

            <div class="message bot">
                Hello! Ask me something like:
                <br><br>
                • Tell me about John Doe
                <br>
                • Who manages Emma Wilson?
                <br>
                • Should David Brown be promoted?
            </div>

        </div>

        <div class="chat-input">

            <input
                id="userInput"
                type="text"
                placeholder="Type your question..."
            >

            <button id="sendBtn">
                Send
            </button>

        </div>

    </div>

    <script src="/static/app.js"></script>

</body>

</html>
